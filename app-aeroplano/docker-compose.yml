version: '3.8'

services:
  backend:
    build: ./backend
    container_name: aeroplano-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: aeroplano-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend